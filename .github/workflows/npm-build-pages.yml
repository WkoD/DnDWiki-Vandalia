name: NPM build index.html

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
        fetch-depth: 0
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies (tiddlywiki + TiddlyDnD-Plugins)
      run: npm install
    - name: Update master
      run: |
        echo '${{ github.event.repository.name }}' >> './tiddlers/$__SiteTitle.tid'
        echo $(TZ=Europe/Berlin date +'%Y-%m-%dT%H:%M:%S') >> './tiddlers/$__SiteSubtitle.tid'
    - name: Build TiddlyWiki master index.html
      # Node-Launcher scripts/tw.js setzt TIDDLYWIKI_PLUGIN_PATH aus ALLEN Plugin-Paketen
      # (tiddlydnd-plugins + tw5-graph/vis-network/relink) + process.noDeprecation.
      # NICHT `npx tiddlywiki` mit Bundle-only-Pfad — sonst fehlt der flibbles/graph-Stack.
      run: npm run build
    - name: Copy resource directories
      run: |
        cp -rl ./data ./twpage/data
        cp -rl ./images ./twpage/images
        find ./twpage -type f -name '.keep' -exec rm {} +
    - name: Deploy to gh_pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./twpage
